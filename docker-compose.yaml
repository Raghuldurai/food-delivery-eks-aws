services:
  food-backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env.docker

  food-frontend:
    build:
      context: ./frontend
      args:
        # Browser talks to backend via exposed port 4000 on the host
        VITE_BACKEND_URL: http://localhost:4000
    ports:
      - "80:80"
    depends_on:
      - food-backend

  food-admin:
    build:
      context: ./admin
      args:
        # Admin panel talks to backend via exposed port 4000 on the host
        VITE_BACKEND_URL: http://localhost:4000
    ports:
      - "3001:80"
    depends_on:
      - food-backend
